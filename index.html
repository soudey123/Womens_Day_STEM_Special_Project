<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>She Shaped Science | Tribute to Women in STEM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;700&display=swap');

        :root {
            --bg-deep: #0a0a1a;
            --gold: #FFD700;
            --rose: #FF6B9D;
            --teal: #4ECDC4;
            --blue: #45B7D1;
            --sage: #96CEB4;
            --purple: #9B59B6;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        h1, h2, h3, .serif {
            font-family: 'Cormorant Garamond', serif;
        }

        /* Starfield Background */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            color: var(--gold);
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            animation: fadeInDown 1.5s ease-out;
        }

        .hero p {
            font-size: clamp(1rem, 3vw, 1.5rem);
            font-style: italic;
            color: var(--rose);
            max-width: 800px;
            animation: fadeInUp 1.5s ease-out 0.5s both;
        }

        .stats-ticker {
            margin-top: 3rem;
            padding: 1rem 2rem;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: var(--gold);
            animation: fadeIn 2s ease-out 1s both;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Filter Bar */
        .filter-section {
            padding: 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 26, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .filter-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--gold);
            color: var(--bg-deep);
            border-color: var(--gold);
        }

        .search-box {
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: white;
            width: 250px;
        }

        .view-toggle {
            display: flex;
            background: var(--glass);
            border-radius: 20px;
            padding: 0.2rem;
            border: 1px solid var(--glass-border);
        }

        .toggle-btn {
            padding: 0.4rem 1rem;
            border-radius: 18px;
            border: none;
            background: transparent;
            color: var(--text-main);
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-btn.active {
            background: var(--rose);
            color: white;
        }

        /* Timeline View */
        .timeline-container {
            max-width: 1000px;
            margin: 4rem auto;
            padding: 0 2rem;
            position: relative;
        }

        .timeline-container::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, var(--gold), var(--rose), var(--teal));
        }

        .timeline-item {
            margin-bottom: 4rem;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            position: relative;
            opacity: 0;
            transform: translateY(50px);
            transition: 0.8s ease-out;
        }

        .timeline-item:nth-child(even) {
            justify-content: flex-start;
        }

        .timeline-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .timeline-dot {
            position: absolute;
            left: 50%;
            top: 20px;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--gold);
            z-index: 2;
            box-shadow: 0 0 15px var(--gold);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        .timeline-card {
            width: 45%;
            padding: 2rem;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            position: relative;
            transition: 0.3s;
        }

        .timeline-card:hover {
            border-color: var(--gold);
            transform: scale(1.02);
        }

        .timeline-card h3 {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .era-badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 10px;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 1rem;
        }

        .field-badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-left: 0.5rem;
        }

        .explore-btn {
            margin-top: 1.5rem;
            padding: 0.6rem 1.5rem;
            border: 1px solid var(--rose);
            background: transparent;
            color: var(--rose);
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .explore-btn:hover {
            background: var(--rose);
            color: white;
        }

        /* Grid View */
        .grid-container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            display: none;
        }

        .grid-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .grid-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--gold), var(--rose));
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--bg-deep);
        }

        .grid-reveal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            opacity: 0;
            transition: 0.4s;
            transform: translateY(100%);
        }

        .grid-card:hover .grid-reveal {
            opacity: 1;
            transform: translateY(0);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal-content {
            background: var(--bg-deep);
            width: 100%;
            max-width: 1100px;
            height: 90vh;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            position: relative;
            animation: scaleIn 0.4s ease-out;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            z-index: 10;
        }

        .modal-left {
            padding: 3rem;
            overflow-y: auto;
            border-right: 1px solid var(--glass-border);
        }

        .modal-right {
            padding: 3rem;
            background: rgba(255, 255, 255, 0.02);
            overflow-y: auto;
        }

        .wiki-img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--glass-border);
        }

        .milestone-list {
            list-style: none;
            margin-top: 1.5rem;
        }

        .milestone-item {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .milestone-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gold);
        }

        .milestone-year {
            font-weight: bold;
            color: var(--gold);
            margin-right: 0.5rem;
        }

        /* Stats & Legend */
        .impact-section {
            padding: 6rem 2rem;
            background: rgba(255, 255, 255, 0.02);
            text-align: center;
        }

        .stats-grid {
            max-width: 1000px;
            margin: 0 auto 4rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }

        .stat-item h4 {
            font-size: 3rem;
            color: var(--gold);
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* Quote Carousel */
        .quotes-section {
            padding: 6rem 2rem;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .quote-container {
            position: relative;
            height: 200px;
        }

        .quote-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            opacity: 0;
            transition: 1s ease-in-out;
        }

        .quote-item.active {
            opacity: 1;
        }

        .quote-text {
            font-size: 2rem;
            font-style: italic;
            margin-bottom: 1.5rem;
            color: var(--gold);
        }

        .quote-author {
            font-weight: bold;
            color: var(--rose);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .timeline-container::before { left: 20px; }
            .timeline-item { justify-content: flex-end !important; }
            .timeline-card { width: calc(100% - 50px); }
            .timeline-dot { left: 20px; }
            .modal-content { grid-template-columns: 1fr; }
            .modal-left { border-right: none; border-bottom: 1px solid var(--glass-border); }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

        const quotes = womenData.map(w => ({ text: w.quote, author: w.name }));

        // Starfield Generation
        function initStars() {
            const starfield = document.getElementById('starfield');
            const count = 200;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
                starfield.appendChild(star);
            }
        }

        // Render Functions
        function renderTimeline(data) {
            const container = document.getElementById('timelineView');
            container.innerHTML = '';
            data.sort((a, b) => a.breakthroughYear - b.breakthroughYear).forEach((woman, index) => {
                const item = document.createElement('div');
                item.className = 'timeline-item';
                item.innerHTML = `
                    <div class="timeline-dot" style="background: ${woman.color}; box-shadow: 0 0 15px ${woman.color}"></div>
                    <div class="timeline-card">
                        <span class="era-badge">${woman.born}–${woman.died || 'Present'}</span>
                        <span class="field-badge" style="color: ${woman.color}">${woman.field}</span>
                        <h3>${woman.name}</h3>
                        <p>Breakthrough: ${woman.breakthroughYear}</p>
                        <button class="explore-btn" onclick="openModal(${woman.id})">Explore Journey</button>
                    </div>
                `;
                container.appendChild(item);
            });
            observeTimeline();
        }

        function renderGrid(data) {
            const container = document.getElementById('gridView');
            container.innerHTML = '';
            data.forEach(woman => {
                const initials = woman.name.split(' ').map(n => n[0]).join('');
                const card = document.createElement('div');
                card.className = 'grid-card';
                card.innerHTML = `
                    <div class="avatar">${initials}</div>
                    <h3>${woman.name}</h3>
                    <p style="color: ${woman.color}; font-weight: bold">${woman.field}</p>
                    <p class="serif" style="margin-top: 0.5rem">${woman.born}–${woman.died || 'Present'}</p>
                    <div class="grid-reveal">
                        <p>${woman.whyMatters.substring(0, 100)}...</p>
                        <button class="explore-btn" onclick="openModal(${woman.id})" style="border-color: white; color: white">View Details</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderQuotes() {
            const container = document.getElementById('quoteCarousel');
            quotes.forEach((q, i) => {
                const item = document.createElement('div');
                item.className = `quote-item ${i === 0 ? 'active' : ''}`;
                item.innerHTML = `
                    <p class="quote-text">"${q.text}"</p>
                    <p class="quote-author">— ${q.author}</p>
                `;
                container.appendChild(item);
            });

            let current = 0;
            setInterval(() => {
                const items = document.querySelectorAll('.quote-item');
                items[current].classList.remove('active');
                current = (current + 1) % items.length;
                items[current].classList.add('active');
            }, 5000);
        }

        // Modal Logic
        async function openModal(id) {
            const woman = womenData.find(w => w.id === id);
            const modal = document.getElementById('detailModal');
            const left = document.getElementById('modalLeft');
            const right = document.getElementById('modalRight');

            left.innerHTML = `
                <h2 style="font-size: 3.5rem; color: var(--gold); margin-bottom: 0.5rem">${woman.name}</h2>
                <div style="margin-bottom: 2rem">
                    <span class="field-badge" style="background: ${woman.color}; color: #000; margin-left: 0">${woman.field}</span>
                    <span class="era-badge" style="margin-left: 1rem">${woman.born}–${woman.died || 'Present'}</span>
                </div>
                
                <h3 style="color: var(--rose); font-size: 1.8rem; margin-bottom: 1rem">Life Journey</h3>
                <ul class="milestone-list">
                    ${woman.milestones.map(m => `
                        <li class="milestone-item">
                            <span class="milestone-year">${m.year}</span> ${m.event}
                        </li>
                    `).join('')}
                </ul>

                <h3 style="color: var(--rose); font-size: 1.8rem; margin: 2rem 0 1rem">Why She Matters</h3>
                <p>${woman.whyMatters}</p>

                <h3 style="color: var(--rose); font-size: 1.8rem; margin: 2rem 0 1rem">Barriers Broken</h3>
                <ul style="list-style: none">
                    ${woman.barriers.map(b => `<li style="margin-bottom: 0.5rem">✨ ${b}</li>`).join('')}
                </ul>
            `;

            right.innerHTML = `
                <h3 class="serif" style="font-size: 1.5rem; margin-bottom: 1.5rem">From Wikipedia</h3>
                <div class="spinner"></div>
            `;

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            try {
                const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${woman.wikipedia_key}`);
                const data = await response.json();
                
                right.innerHTML = `
                    <h3 class="serif" style="font-size: 1.5rem; margin-bottom: 1.5rem">From Wikipedia</h3>
                    ${data.thumbnail ? `<img src="${data.thumbnail.source}" class="wiki-img" alt="${woman.name}">` : ''}
                    <p style="font-size: 1.1rem; line-height: 1.8">${data.extract}</p>
                    <a href="${data.content_urls.desktop.page}" target="_blank" style="display: inline-block; margin-top: 2rem; color: var(--gold); text-decoration: none; font-weight: bold">Read Full Article →</a>
                `;
            } catch (error) {
                right.innerHTML = `<p>Failed to load Wikipedia summary. Please check your connection.</p>`;
            }
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Intersection Observer for Timeline
        function observeTimeline() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.2 });

            document.querySelectorAll('.timeline-item').forEach(item => {
                observer.observe(item);
            });
        }

        // Filtering Logic
        function applyFilters() {
            const field = document.querySelector('#fieldFilters .active').dataset.filter;
            const decade = document.querySelector('#decadeFilters .active').dataset.decade;
            const search = document.getElementById('searchInput').value.toLowerCase();

            const filtered = womenData.filter(w => {
                const matchesField = field === 'all' || w.field === field;
                const matchesDecade = decade === 'all' || (w.breakthroughYear >= parseInt(decade) && w.breakthroughYear < parseInt(decade) + 20);
                const matchesSearch = w.name.toLowerCase().includes(search) || w.field.toLowerCase().includes(search);
                return matchesField && matchesDecade && matchesSearch;
            });

            renderTimeline(filtered);
            renderGrid(filtered);
        }

        // Event Listeners
        document.getElementById('closeModal').onclick = closeModal;
        window.onclick = (e) => { if (e.target === document.getElementById('detailModal')) closeModal(); };

        document.querySelectorAll('#fieldFilters .filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelector('#fieldFilters .active').classList.remove('active');
                btn.classList.add('active');
                applyFilters();
            };
        });

        document.querySelectorAll('#decadeFilters .filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelector('#decadeFilters .active').classList.remove('active');
                btn.classList.add('active');
                applyFilters();
            };
        });

        document.getElementById('searchInput').oninput = applyFilters;

        document.getElementById('timelineViewBtn').onclick = () => {
            document.getElementById('timelineViewBtn').classList.add('active');
            document.getElementById('gridViewBtn').classList.remove('active');
            document.getElementById('timelineView').style.display = 'block';
            document.getElementById('gridView').style.display = 'none';
        };

        document.getElementById('gridViewBtn').onclick = () => {
            document.getElementById('gridViewBtn').classList.add('active');
            document.getElementById('timelineViewBtn').classList.remove('active');
            document.getElementById('timelineView').style.display = 'none';
            document.getElementById('gridView').style.display = 'grid';
        };

        // Init
        window.onload = () => {
            initStars();
            renderTimeline(womenData);
            renderGrid(womenData);
            renderQuotes();
        };
    </script>
